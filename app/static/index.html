<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배송 관리기</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>배송 관리기</h1>
      <p class="description">SK스토아 크롤링 후 송장번호를 채우고, 송장번호 기준으로 배송정보를 업데이트합니다.</p>

      <section class="card workflow">
        <h2>Sheet2 통합 실행</h2>
        <form id="sync-form">
          <label for="excel-path">엑셀 경로 (Sheet2 양식)</label>
          <div class="path-field">
            <input
              id="excel-path"
              type="text"
              required
              placeholder="/Users/.../통합 문서1.xlsx"
            />
            <button id="pick-excel" type="button" class="secondary">선택</button>
          </div>

          <button type="submit">통합 실행</button>
        </form>
        <pre id="sync-log" class="sync-log"></pre>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
