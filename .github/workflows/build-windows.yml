name: Build Windows Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Windows Bundle
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: |
          pwsh -ExecutionPolicy Bypass -File crawler/scripts/mall/build_windows_bundle.ps1

      - name: Zip bundle
        shell: pwsh
        run: |
          Rename-Item crawler/dist/windows-bundle ExcelDeliveryUpdater
          Compress-Archive -Path crawler/dist/ExcelDeliveryUpdater -DestinationPath ExcelDeliveryUpdater-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ExcelDeliveryUpdater-windows
          path: ExcelDeliveryUpdater-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ExcelDeliveryUpdater-windows.zip
          generate_release_notes: false
